name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out policyengine-uk-paper
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX (for PDF rendering)
        run: quarto install tinytex --no-prompt

      - name: Render paper (HTML)
        run: quarto render paper/index.qmd --to html

      - name: Render paper (PDF)
        run: quarto render paper/index.qmd --to pdf

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out policyengine-uk-paper
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .
